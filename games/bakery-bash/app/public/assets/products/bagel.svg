<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Bagel (icon)</title>
  <desc>Pixel-art SVG icon. Transparent background. 32x32.</desc>
  <!-- Palette: outline:#1c1a1a dough:#E8D5BE flour:#F0E6D8 caramel:#C4873B honey:#F5C96A hole:#3D2317 shadow:#00000022 -->

  <!-- outer outline -->
  <rect x="12" y="8" width="8" height="1" fill="#1c1a1a"/>
  <rect x="10" y="9" width="2" height="1" fill="#1c1a1a"/>
  <rect x="20" y="9" width="2" height="1" fill="#1c1a1a"/>
  <rect x="9" y="10" width="1" height="2" fill="#1c1a1a"/>
  <rect x="22" y="10" width="1" height="2" fill="#1c1a1a"/>
  <rect x="8" y="12" width="1" height="8" fill="#1c1a1a"/>
  <rect x="23" y="12" width="1" height="8" fill="#1c1a1a"/>
  <rect x="9" y="20" width="1" height="2" fill="#1c1a1a"/>
  <rect x="22" y="20" width="1" height="2" fill="#1c1a1a"/>
  <rect x="10" y="22" width="2" height="1" fill="#1c1a1a"/>
  <rect x="20" y="22" width="2" height="1" fill="#1c1a1a"/>
  <rect x="12" y="23" width="8" height="1" fill="#1c1a1a"/>

  <!-- fill ring -->
  <rect x="12" y="9" width="8" height="1" fill="#E8D5BE"/>
  <rect x="10" y="10" width="12" height="2" fill="#E8D5BE"/>
  <rect x="9" y="12" width="14" height="8" fill="#E8D5BE"/>
  <rect x="10" y="20" width="12" height="2" fill="#E8D5BE"/>
  <rect x="12" y="22" width="8" height="1" fill="#E8D5BE"/>

  <!-- inner hole (outline + fill) -->
  <rect x="14" y="13" width="4" height="1" fill="#1c1a1a"/>
  <rect x="13" y="14" width="1" height="4" fill="#1c1a1a"/>
  <rect x="18" y="14" width="1" height="4" fill="#1c1a1a"/>
  <rect x="14" y="18" width="4" height="1" fill="#1c1a1a"/>

  <rect x="14" y="14" width="4" height="4" fill="#3D2317"/>

  <!-- toasted shading -->
  <rect x="11" y="12" width="1" height="1" fill="#C4873B"/>
  <rect x="20" y="12" width="1" height="1" fill="#C4873B"/>
  <rect x="10" y="18" width="1" height="1" fill="#C4873B"/>
  <rect x="21" y="18" width="1" height="1" fill="#C4873B"/>
  <rect x="12" y="20" width="1" height="1" fill="#F5C96A"/>
  <rect x="19" y="20" width="1" height="1" fill="#F5C96A"/>

  <!-- highlight -->
  <rect x="12" y="10" width="2" height="1" fill="#F0E6D8"/>
  <rect x="14" y="11" width="1" height="1" fill="#F0E6D8"/>

  <!-- shadow -->
  <rect x="10" y="25" width="14" height="1" fill="#00000022"/>
</svg>

