<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Sandwich (icon)</title>
  <desc>Pixel-art SVG icon. Transparent background. 32x32.</desc>
  <!-- Palette: outline:#1c1a1a bread:#E8D5BE crust:#C4873B highlight:#F0E6D8 lettuce:#7A9E7E tomato:#B54B6C cheese:#F5C96A shadow:#00000022 -->

  <!-- top bun outline -->
  <rect x="9" y="11" width="14" height="1" fill="#1c1a1a"/>
  <rect x="8" y="12" width="1" height="4" fill="#1c1a1a"/>
  <rect x="23" y="12" width="1" height="4" fill="#1c1a1a"/>
  <rect x="9" y="16" width="14" height="1" fill="#1c1a1a"/>

  <!-- top bun fill -->
  <rect x="9" y="12" width="14" height="4" fill="#E8D5BE"/>
  <rect x="9" y="12" width="14" height="1" fill="#C4873B"/>
  <rect x="11" y="13" width="3" height="1" fill="#F0E6D8"/>
  <rect x="15" y="13" width="1" height="1" fill="#F0E6D8"/>

  <!-- fillings -->
  <rect x="10" y="17" width="12" height="1" fill="#1c1a1a"/>
  <rect x="10" y="18" width="12" height="1" fill="#7A9E7E"/>
  <rect x="11" y="19" width="10" height="1" fill="#F5C96A"/>
  <rect x="12" y="20" width="8" height="1" fill="#B54B6C"/>

  <!-- bottom bun outline -->
  <rect x="9" y="21" width="14" height="1" fill="#1c1a1a"/>
  <rect x="8" y="22" width="1" height="3" fill="#1c1a1a"/>
  <rect x="23" y="22" width="1" height="3" fill="#1c1a1a"/>
  <rect x="9" y="25" width="14" height="1" fill="#1c1a1a"/>

  <!-- bottom bun fill -->
  <rect x="9" y="22" width="14" height="3" fill="#E8D5BE"/>
  <rect x="9" y="24" width="14" height="1" fill="#C4873B"/>
  <rect x="18" y="22" width="3" height="1" fill="#F0E6D8"/>

  <!-- shadow -->
  <rect x="9" y="27" width="14" height="1" fill="#00000022"/>
</svg>

