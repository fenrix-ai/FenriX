<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Radio Advertisement</title>
  <!-- antenna -->
  <rect x="22" y="3" width="1" height="1" fill="#1c1a1a"/>
  <rect x="21" y="4" width="1" height="1" fill="#1c1a1a"/>
  <rect x="20" y="5" width="1" height="1" fill="#1c1a1a"/>
  <rect x="19" y="6" width="1" height="2" fill="#1c1a1a"/>
  <!-- radio body -->
  <rect x="6" y="8" width="20" height="2" fill="#8b5e3c"/>
  <rect x="5" y="10" width="22" height="12" fill="#a0704d"/>
  <rect x="6" y="22" width="20" height="2" fill="#8b5e3c"/>
  <!-- speaker grille -->
  <rect x="7" y="11" width="10" height="10" fill="#6b4226"/>
  <rect x="8" y="12" width="8" height="2" fill="#8b5e3c"/>
  <rect x="8" y="15" width="8" height="2" fill="#8b5e3c"/>
  <rect x="8" y="18" width="8" height="2" fill="#8b5e3c"/>
  <!-- dial -->
  <rect x="19" y="12" width="4" height="4" fill="#e8c44a"/>
  <rect x="20" y="13" width="2" height="2" fill="#d4ad38"/>
  <!-- tuning knob -->
  <rect x="19" y="18" width="2" height="2" fill="#3d3d3d"/>
  <rect x="22" y="18" width="2" height="2" fill="#3d3d3d"/>
  <!-- sound waves -->
  <rect x="3" y="13" width="1" height="1" fill="#e8c44a66"/>
  <rect x="2" y="12" width="1" height="3" fill="#e8c44a44"/>
  <rect x="1" y="11" width="1" height="5" fill="#e8c44a22"/>
</svg>
