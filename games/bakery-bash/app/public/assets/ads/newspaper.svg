<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Newspaper Advertisement</title>
  <!-- paper body -->
  <rect x="5" y="4" width="22" height="24" fill="#f5f0e0"/>
  <rect x="4" y="5" width="1" height="22" fill="#ede5d0"/>
  <rect x="27" y="5" width="1" height="22" fill="#e0d8c4"/>
  <!-- fold line -->
  <rect x="5" y="15" width="22" height="1" fill="#d8d0bc"/>
  <!-- header -->
  <rect x="7" y="6" width="18" height="2" fill="#1c1a1a"/>
  <!-- headline text (blocks) -->
  <rect x="7" y="9" width="14" height="1" fill="#3d3d3d"/>
  <rect x="7" y="11" width="10" height="1" fill="#3d3d3d"/>
  <!-- image placeholder -->
  <rect x="17" y="11" width="6" height="3" fill="#b0a890"/>
  <!-- body text lines -->
  <rect x="7" y="13" width="9" height="1" fill="#8a8070"/>
  <rect x="7" y="16" width="18" height="1" fill="#8a8070"/>
  <rect x="7" y="18" width="18" height="1" fill="#8a8070"/>
  <rect x="7" y="20" width="14" height="1" fill="#8a8070"/>
  <rect x="7" y="22" width="18" height="1" fill="#8a8070"/>
  <rect x="7" y="24" width="10" height="1" fill="#8a8070"/>
  <!-- column divider -->
  <rect x="16" y="16" width="1" height="10" fill="#c8c0ac"/>
</svg>
