  <rect x="12" y="16" width="3" height="1" fill="#ffffff"/>
  <rect x="17" y="16" width="3" height="1" fill="#ffffff"/>
  <rect x="11" y="17" width="10" height="1" fill="#ffffff"/>
  <rect x="11" y="18" width="10" height="1" fill="#ffffff"/>
  <rect x="12" y="19" width="8" height="1" fill="#efe7d6"/>
  <rect x="12" y="20" width="8" height="1" fill="#efe7d6"/>
  <rect x="12" y="21" width="8" height="1" fill="#efe7d6"/>
