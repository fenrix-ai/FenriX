  <!-- legs -->
  <rect x="13" y="22" width="3" height="5" fill="#56606d"/>
  <rect x="16" y="22" width="3" height="5" fill="#56606d"/>
  <rect x="13" y="27" width="3" height="1" fill="#2b2b2b"/>
  <rect x="16" y="27" width="3" height="1" fill="#2b2b2b"/>
  <rect x="12" y="29" width="10" height="1" fill="#00000022"/>
