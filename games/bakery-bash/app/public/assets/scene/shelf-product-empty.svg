<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 16" shape-rendering="crispEdges">
  <title>Empty pastry tray</title>

  <!-- tray body -->
  <rect x="1" y="9" width="22" height="5" fill="#D4B97F"/>
  <!-- tray lip highlight -->
  <rect x="1" y="9" width="22" height="1" fill="#E5CC9B"/>
  <!-- tray shadow at base -->
  <rect x="1" y="13" width="22" height="1" fill="#8B6A3A"/>
  <rect x="0" y="14" width="24" height="1" fill="#6B4A2A"/>
  <!-- sides of tray -->
  <rect x="0" y="9" width="1" height="5" fill="#8B6A3A"/>
  <rect x="23" y="9" width="1" height="5" fill="#8B6A3A"/>
  <!-- a few crumbs on tray -->
  <rect x="6"  y="11" width="1" height="1" fill="#8B6A3A"/>
  <rect x="12" y="12" width="1" height="1" fill="#8B6A3A"/>
  <rect x="17" y="11" width="1" height="1" fill="#8B6A3A"/>
  <!-- "SOLD OUT" tag on top -->
  <rect x="8" y="3" width="8" height="4" fill="#8B2F2F"/>
  <rect x="9" y="4" width="6" height="2" fill="#C64949"/>
  <rect x="8" y="7" width="8" height="1" fill="#5A1F1F"/>
  <!-- tag tie rope -->
  <rect x="11" y="1" width="2" height="2" fill="#8B6A3A"/>
</svg>
