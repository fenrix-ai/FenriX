<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 14" shape-rendering="crispEdges">
  <title>Dollar bill</title>

  <!-- bill body (green) -->
  <rect x="0" y="0" width="24" height="14" fill="#7FB87F"/>
  <!-- darker outer border -->
  <rect x="0" y="0" width="24" height="1" fill="#3F723F"/>
  <rect x="0" y="13" width="24" height="1" fill="#3F723F"/>
  <rect x="0" y="0" width="1" height="14" fill="#3F723F"/>
  <rect x="23" y="0" width="1" height="14" fill="#3F723F"/>
  <!-- inner frame -->
  <rect x="2" y="2" width="20" height="1" fill="#3F723F"/>
  <rect x="2" y="11" width="20" height="1" fill="#3F723F"/>
  <rect x="2" y="2" width="1" height="10" fill="#3F723F"/>
  <rect x="21" y="2" width="1" height="10" fill="#3F723F"/>
  <!-- big $ in center -->
  <rect x="11" y="4" width="1" height="1" fill="#1E4D1E"/>
  <rect x="12" y="4" width="1" height="1" fill="#1E4D1E"/>
  <rect x="10" y="5" width="1" height="1" fill="#1E4D1E"/>
  <rect x="11" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="13" y="5" width="1" height="1" fill="#1E4D1E"/>
  <rect x="10" y="6" width="1" height="1" fill="#1E4D1E"/>
  <rect x="11" y="6" width="3" height="1" fill="#FFFFFF"/>
  <rect x="11" y="7" width="3" height="1" fill="#FFFFFF"/>
  <rect x="13" y="7" width="1" height="1" fill="#1E4D1E"/>
  <rect x="11" y="8" width="3" height="1" fill="#FFFFFF"/>
  <rect x="10" y="8" width="1" height="1" fill="#1E4D1E"/>
  <rect x="13" y="8" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="9" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="9" width="1" height="1" fill="#1E4D1E"/>
  <!-- small corner $s -->
  <rect x="4"  y="4" width="1" height="2" fill="#E5C547"/>
  <rect x="19" y="4" width="1" height="2" fill="#E5C547"/>
  <rect x="4"  y="8" width="1" height="2" fill="#E5C547"/>
  <rect x="19" y="8" width="1" height="2" fill="#E5C547"/>
</svg>
