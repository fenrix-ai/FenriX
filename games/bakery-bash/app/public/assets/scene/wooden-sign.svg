<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" shape-rendering="crispEdges">
  <title>Hanging wooden welcome sign</title>

  <!-- ropes attaching to ceiling -->
  <rect x="36" y="0"  width="2" height="12" fill="#6B4A2A"/>
  <rect x="162" y="0" width="2" height="12" fill="#6B4A2A"/>
  <rect x="34" y="1" width="1" height="10" fill="#8B6A3A"/>
  <rect x="160" y="1" width="1" height="10" fill="#8B6A3A"/>

  <!-- plank body -->
  <rect x="20" y="12" width="160" height="40" fill="#B8865C"/>
  <!-- top highlight -->
  <rect x="20" y="12" width="160" height="3" fill="#D7AE85"/>
  <!-- bottom shadow -->
  <rect x="20" y="48" width="160" height="4" fill="#8B6A3A"/>
  <!-- frame border -->
  <rect x="20" y="12" width="160" height="2" fill="#5A3A20"/>
  <rect x="20" y="50" width="160" height="2" fill="#5A3A20"/>
  <rect x="20" y="12" width="2" height="40" fill="#5A3A20"/>
  <rect x="178" y="12" width="2" height="40" fill="#5A3A20"/>
  <!-- nail heads at corners -->
  <circle cx="27" cy="17" r="1" fill="#3B2A1A"/>
  <circle cx="173" cy="17" r="1" fill="#3B2A1A"/>
  <circle cx="27" cy="47" r="1" fill="#3B2A1A"/>
  <circle cx="173" cy="47" r="1" fill="#3B2A1A"/>

  <!-- wood grain (thin horizontal lines) -->
  <rect x="26" y="22" width="148" height="1" fill="#A0734A" opacity="0.4"/>
  <rect x="26" y="32" width="148" height="1" fill="#A0734A" opacity="0.4"/>
  <rect x="26" y="42" width="148" height="1" fill="#A0734A" opacity="0.4"/>
</svg>
