<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 80" shape-rendering="crispEdges">
  <title>Bakery front door</title>

  <!-- frame -->
  <rect x="0" y="0" width="40" height="80" fill="#3B2A1A"/>
  <!-- door slab -->
  <rect x="3" y="3" width="34" height="75" fill="#5A3A20"/>
  <!-- plank lines -->
  <rect x="3" y="28" width="34" height="1" fill="#3B2A1A"/>
  <rect x="3" y="52" width="34" height="1" fill="#3B2A1A"/>
  <!-- upper window -->
  <rect x="9" y="8" width="22" height="18" fill="#3B2A1A"/>
  <rect x="11" y="10" width="18" height="14" fill="#9ECBEC"/>
  <rect x="11" y="10" width="18" height="4" fill="#B8DDF0"/>
  <!-- window cross -->
  <rect x="19" y="10" width="2" height="14" fill="#3B2A1A"/>
  <rect x="11" y="16" width="18" height="2" fill="#3B2A1A"/>
  <!-- door handle -->
  <circle cx="33" cy="44" r="2" fill="#E5C547"/>
  <rect x="32" y="44" width="2" height="1" fill="#B89B22"/>
  <!-- bell above door -->
  <rect x="6" y="5" width="3" height="2" fill="#E5C547"/>
  <rect x="6" y="7" width="3" height="1" fill="#B89B22"/>
</svg>
