<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <title>Maintenance Wrenchman - navy utility uniform, holding wrench</title>

  <!-- cap -->
