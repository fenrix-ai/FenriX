  <rect x="11" y="6" width="10" height="1" fill="#203a5f"/>
  <rect x="11" y="7" width="10" height="1" fill="#203a5f"/>
  <rect x="10" y="8" width="12" height="1" fill="#17283f"/>

  <!-- head -->
  <rect x="12" y="9" width="8" height="1" fill="#e2ad7b"/>
  <rect x="11" y="10" width="10" height="1" fill="#e2ad7b"/>
  <rect x="11" y="11" width="10" height="1" fill="#e2ad7b"/>
  <rect x="12" y="12" width="8" height="1" fill="#e2ad7b"/>
  <rect x="12" y="13" width="8" height="1" fill="#e2ad7b"/>
  <rect x="13" y="14" width="6" height="1" fill="#d49a67"/>

