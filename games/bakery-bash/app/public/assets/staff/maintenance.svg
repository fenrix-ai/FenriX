  <rect x="24" y="24" width="1" height="1" fill="#b8c1c9"/>
  <rect x="25" y="17" width="1" height="2" fill="#8f9aa3"/>
  <rect x="25" y="23" width="1" height="2" fill="#8f9aa3"/>
  <rect x="26" y="18" width="1" height="1" fill="#b8c1c9"/>
  <rect x="26" y="24" width="1" height="1" fill="#b8c1c9"/>

