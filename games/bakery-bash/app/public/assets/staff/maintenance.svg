  <!-- navy utility shirt -->
  <rect x="12" y="16" width="8" height="1" fill="#203a5f"/>
  <rect x="11" y="17" width="10" height="1" fill="#274a78"/>
  <rect x="11" y="18" width="10" height="1" fill="#274a78"/>
  <rect x="11" y="19" width="10" height="1" fill="#274a78"/>
