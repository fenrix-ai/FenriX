    <rect x="12" y="15" width="8" height="1" fill="#1c1a1a"/>
    <rect x="12" y="16" width="8" height="1" fill="#7bd389"/>
    <rect x="11" y="17" width="10" height="1" fill="#7bd389"/>
    <rect x="11" y="18" width="10" height="1" fill="#7bd389"/>
    <rect x="12" y="19" width="8" height="1" fill="#7bd389"/>
    <rect x="14" y="18" width="4" height="1" fill="#6ac57b"/>

