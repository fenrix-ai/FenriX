    <rect x="22" y="19" width="3" height="4" fill="#d7b07c"/>

    <!-- legs (opposite walk pose) -->
    <rect x="13" y="20" width="3" height="1" fill="#4a5568"/>
    <rect x="16" y="20" width="3" height="1" fill="#4a5568"/>
    <rect x="14" y="21" width="2" height="4" fill="#4a5568"/>
    <rect x="16" y="21" width="3" height="5" fill="#4a5568"/>
    <rect x="12" y="25" width="3" height="1" fill="#2b2b2b"/>
    <rect x="16" y="26" width="3" height="1" fill="#2b2b2b"/>

    <rect x="12" y="29" width="10" height="1" fill="#00000022"/>
