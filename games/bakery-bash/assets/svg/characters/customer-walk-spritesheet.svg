    <rect x="9" y="19" width="1" height="3" fill="#f0c7a2"/>
    <rect x="21" y="17" width="1" height="2" fill="#7bd389"/>
    <rect x="22" y="19" width="1" height="3" fill="#f0c7a2"/>

