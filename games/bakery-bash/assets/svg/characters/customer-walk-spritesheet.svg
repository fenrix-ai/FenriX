<svg xmlns="http://www.w3.org/2000/svg" width="96" height="48" viewBox="0 0 96 48" shape-rendering="crispEdges">
  <title>Customer walk (3 frames) — 32x48 each</title>
  <desc>Pixel-art SVG spritesheet. Transparent background. Frames at x=0..31, 32..63, 64..95.</desc>

  <!-- Palette -->
  <!-- skin:#f0c7a2 hair:#5a3b2e outline:#1c1a1a hoodie:#7bd389 pants:#4a5568 shoes:#2b2b2b bag:#d7b07c bagDark:#b9905f shadow:#00000022 -->

  <!-- FRAME 1 -->
  <g id="frame-1" transform="translate(0 0)">
    <!-- hair -->
    <rect x="13" y="7" width="6" height="1" fill="#5a3b2e"/>
    <rect x="12" y="8" width="8" height="1" fill="#5a3b2e"/>
    <!-- head -->
    <rect x="12" y="9" width="8" height="1" fill="#f0c7a2"/>
    <rect x="11" y="10" width="10" height="1" fill="#f0c7a2"/>
    <rect x="11" y="11" width="10" height="1" fill="#f0c7a2"/>
    <rect x="12" y="12" width="8" height="1" fill="#f0c7a2"/>
    <rect x="12" y="13" width="8" height="1" fill="#f0c7a2"/>
    <rect x="13" y="14" width="6" height="1" fill="#f0c7a2"/>
    <!-- eyes -->
    <rect x="14" y="11" width="1" height="1" fill="#1c1a1a"/>
    <rect x="17" y="11" width="1" height="1" fill="#1c1a1a"/>

    <!-- hoodie -->
    <rect x="12" y="15" width="8" height="1" fill="#1c1a1a"/>
    <rect x="12" y="16" width="8" height="1" fill="#7bd389"/>
    <rect x="11" y="17" width="10" height="1" fill="#7bd389"/>
    <rect x="11" y="18" width="10" height="1" fill="#7bd389"/>
    <rect x="12" y="19" width="8" height="1" fill="#7bd389"/>
    <!-- hoodie pocket -->
    <rect x="14" y="18" width="4" height="1" fill="#6ac57b"/>

    <!-- arms -->
    <rect x="10" y="17" width="1" height="3" fill="#7bd389"/>
    <rect x="9" y="20" width="1" height="2" fill="#f0c7a2"/>
    <rect x="21" y="17" width="1" height="3" fill="#7bd389"/>
    <rect x="22" y="20" width="1" height="2" fill="#f0c7a2"/>

    <!-- bag (shopping bag) -->
    <rect x="22" y="18" width="3" height="1" fill="#b9905f"/>
    <rect x="22" y="19" width="3" height="4" fill="#d7b07c"/>

    <!-- legs (walk pose) -->
    <rect x="13" y="20" width="3" height="1" fill="#4a5568"/>
    <rect x="16" y="20" width="3" height="1" fill="#4a5568"/>
    <rect x="13" y="21" width="3" height="5" fill="#4a5568"/>
    <rect x="17" y="21" width="2" height="4" fill="#4a5568"/>
    <!-- shoes -->
    <rect x="13" y="26" width="3" height="1" fill="#2b2b2b"/>
    <rect x="17" y="25" width="3" height="1" fill="#2b2b2b"/>

    <rect x="12" y="29" width="10" height="1" fill="#00000022"/>
  </g>

  <!-- FRAME 2 -->
  <g id="frame-2" transform="translate(32 0)">
    <!-- hair -->
    <rect x="13" y="7" width="6" height="1" fill="#5a3b2e"/>
    <rect x="12" y="8" width="8" height="1" fill="#5a3b2e"/>
    <!-- head -->
    <rect x="12" y="9" width="8" height="1" fill="#f0c7a2"/>
    <rect x="11" y="10" width="10" height="1" fill="#f0c7a2"/>
    <rect x="11" y="11" width="10" height="1" fill="#f0c7a2"/>
    <rect x="12" y="12" width="8" height="1" fill="#f0c7a2"/>
    <rect x="12" y="13" width="8" height="1" fill="#f0c7a2"/>
    <rect x="13" y="14" width="6" height="1" fill="#f0c7a2"/>
    <rect x="14" y="11" width="1" height="1" fill="#1c1a1a"/>
    <rect x="17" y="11" width="1" height="1" fill="#1c1a1a"/>

