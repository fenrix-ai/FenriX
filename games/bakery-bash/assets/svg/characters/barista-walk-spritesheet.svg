<svg xmlns="http://www.w3.org/2000/svg" width="96" height="48" viewBox="0 0 96 48" shape-rendering="crispEdges">
  <title>Barista walk (3 frames) — 32x48 each</title>
  <desc>Pixel-art SVG spritesheet. Transparent background. Frames at x=0..31, 32..63, 64..95.</desc>

  <!-- Palette -->
  <!-- skin:#f2c9a0 hair:#3a2a20 outline:#1c1a1a shirt:#6db4ff apron:#f4f0e8 pants:#3c4c6a shoes:#2b2b2b shadow:#00000022 -->

  <!-- Helper: draw a pixel -->
  <!-- We intentionally keep this verbose but simple/portable. -->

  <!-- FRAME 1 -->
  <g id="frame-1" transform="translate(0 0)">
    <!-- head -->
    <rect x="14" y="6" width="4" height="1" fill="#3a2a20"/>
    <rect x="13" y="7" width="6" height="1" fill="#3a2a20"/>
    <rect x="12" y="8" width="8" height="1" fill="#3a2a20"/>
    <rect x="12" y="9" width="8" height="1" fill="#f2c9a0"/>
    <rect x="11" y="10" width="10" height="1" fill="#f2c9a0"/>
    <rect x="11" y="11" width="10" height="1" fill="#f2c9a0"/>
    <rect x="12" y="12" width="8" height="1" fill="#f2c9a0"/>
    <rect x="12" y="13" width="8" height="1" fill="#f2c9a0"/>
    <rect x="13" y="14" width="6" height="1" fill="#f2c9a0"/>
    <rect x="14" y="15" width="4" height="1" fill="#f2c9a0"/>
    <!-- hair fringe -->
    <rect x="12" y="9" width="2" height="1" fill="#3a2a20"/>
    <rect x="18" y="9" width="2" height="1" fill="#3a2a20"/>
    <!-- eyes -->
    <rect x="14" y="11" width="1" height="1" fill="#1c1a1a"/>
    <rect x="17" y="11" width="1" height="1" fill="#1c1a1a"/>

    <!-- body -->
    <rect x="12" y="16" width="8" height="1" fill="#1c1a1a"/>
    <rect x="12" y="17" width="8" height="1" fill="#6db4ff"/>
    <rect x="11" y="18" width="10" height="1" fill="#6db4ff"/>
    <rect x="11" y="19" width="10" height="1" fill="#6db4ff"/>
    <rect x="12" y="20" width="8" height="1" fill="#f4f0e8"/>
    <rect x="12" y="21" width="8" height="1" fill="#f4f0e8"/>
    <rect x="12" y="22" width="8" height="1" fill="#f4f0e8"/>
    <!-- apron ties -->
    <rect x="11" y="21" width="1" height="1" fill="#f4f0e8"/>
    <rect x="20" y="21" width="1" height="1" fill="#f4f0e8"/>

    <!-- arms -->
    <rect x="10" y="18" width="1" height="3" fill="#6db4ff"/>
    <rect x="9" y="21" width="1" height="2" fill="#f2c9a0"/>
    <rect x="21" y="18" width="1" height="3" fill="#6db4ff"/>
    <rect x="22" y="21" width="1" height="2" fill="#f2c9a0"/>

    <!-- legs (walk pose) -->
    <rect x="13" y="23" width="3" height="1" fill="#3c4c6a"/>
    <rect x="16" y="23" width="3" height="1" fill="#3c4c6a"/>
    <rect x="13" y="24" width="3" height="4" fill="#3c4c6a"/>
    <rect x="17" y="24" width="2" height="3" fill="#3c4c6a"/>
    <!-- shoes -->
    <rect x="13" y="28" width="3" height="1" fill="#2b2b2b"/>
    <rect x="17" y="27" width="3" height="1" fill="#2b2b2b"/>

    <!-- tiny shadow -->
    <rect x="12" y="30" width="10" height="1" fill="#00000022"/>
  </g>

  <!-- FRAME 2 -->
  <g id="frame-2" transform="translate(32 0)">
    <!-- head -->
    <rect x="14" y="6" width="4" height="1" fill="#3a2a20"/>
    <rect x="13" y="7" width="6" height="1" fill="#3a2a20"/>
    <rect x="12" y="8" width="8" height="1" fill="#3a2a20"/>
    <rect x="12" y="9" width="8" height="1" fill="#f2c9a0"/>
    <rect x="11" y="10" width="10" height="1" fill="#f2c9a0"/>
    <rect x="11" y="11" width="10" height="1" fill="#f2c9a0"/>
    <rect x="12" y="12" width="8" height="1" fill="#f2c9a0"/>
    <rect x="12" y="13" width="8" height="1" fill="#f2c9a0"/>
    <rect x="13" y="14" width="6" height="1" fill="#f2c9a0"/>
    <rect x="14" y="15" width="4" height="1" fill="#f2c9a0"/>
    <rect x="12" y="9" width="2" height="1" fill="#3a2a20"/>
    <rect x="18" y="9" width="2" height="1" fill="#3a2a20"/>
    <rect x="14" y="11" width="1" height="1" fill="#1c1a1a"/>
    <rect x="17" y="11" width="1" height="1" fill="#1c1a1a"/>

    <!-- body -->
    <rect x="12" y="16" width="8" height="1" fill="#1c1a1a"/>
    <rect x="12" y="17" width="8" height="1" fill="#6db4ff"/>
    <rect x="11" y="18" width="10" height="1" fill="#6db4ff"/>
    <rect x="11" y="19" width="10" height="1" fill="#6db4ff"/>
    <rect x="12" y="20" width="8" height="1" fill="#f4f0e8"/>
    <rect x="12" y="21" width="8" height="1" fill="#f4f0e8"/>
    <rect x="12" y="22" width="8" height="1" fill="#f4f0e8"/>
    <rect x="11" y="21" width="1" height="1" fill="#f4f0e8"/>
    <rect x="20" y="21" width="1" height="1" fill="#f4f0e8"/>

    <!-- arms (slightly different swing) -->
    <rect x="10" y="18" width="1" height="3" fill="#6db4ff"/>
    <rect x="9" y="21" width="1" height="2" fill="#f2c9a0"/>
    <rect x="21" y="18" width="1" height="2" fill="#6db4ff"/>
    <rect x="22" y="20" width="1" height="3" fill="#f2c9a0"/>

    <!-- legs (neutral) -->
    <rect x="13" y="23" width="3" height="1" fill="#3c4c6a"/>
    <rect x="16" y="23" width="3" height="1" fill="#3c4c6a"/>
    <rect x="13" y="24" width="3" height="4" fill="#3c4c6a"/>
    <rect x="16" y="24" width="3" height="4" fill="#3c4c6a"/>
    <rect x="13" y="28" width="3" height="1" fill="#2b2b2b"/>
    <rect x="16" y="28" width="3" height="1" fill="#2b2b2b"/>
    <rect x="12" y="30" width="10" height="1" fill="#00000022"/>
  </g>

  <!-- FRAME 3 -->
  <g id="frame-3" transform="translate(64 0)">
    <!-- head -->
    <rect x="14" y="6" width="4" height="1" fill="#3a2a20"/>
    <rect x="13" y="7" width="6" height="1" fill="#3a2a20"/>
    <rect x="12" y="8" width="8" height="1" fill="#3a2a20"/>
    <rect x="12" y="9" width="8" height="1" fill="#f2c9a0"/>
    <rect x="11" y="10" width="10" height="1" fill="#f2c9a0"/>
    <rect x="11" y="11" width="10" height="1" fill="#f2c9a0"/>
    <rect x="12" y="12" width="8" height="1" fill="#f2c9a0"/>
    <rect x="12" y="13" width="8" height="1" fill="#f2c9a0"/>
    <rect x="13" y="14" width="6" height="1" fill="#f2c9a0"/>
    <rect x="14" y="15" width="4" height="1" fill="#f2c9a0"/>
    <rect x="12" y="9" width="2" height="1" fill="#3a2a20"/>
    <rect x="18" y="9" width="2" height="1" fill="#3a2a20"/>
    <rect x="14" y="11" width="1" height="1" fill="#1c1a1a"/>
    <rect x="17" y="11" width="1" height="1" fill="#1c1a1a"/>

    <!-- body -->
    <rect x="12" y="16" width="8" height="1" fill="#1c1a1a"/>
    <rect x="12" y="17" width="8" height="1" fill="#6db4ff"/>
    <rect x="11" y="18" width="10" height="1" fill="#6db4ff"/>
    <rect x="11" y="19" width="10" height="1" fill="#6db4ff"/>
    <rect x="12" y="20" width="8" height="1" fill="#f4f0e8"/>
    <rect x="12" y="21" width="8" height="1" fill="#f4f0e8"/>
    <rect x="12" y="22" width="8" height="1" fill="#f4f0e8"/>
    <rect x="11" y="21" width="1" height="1" fill="#f4f0e8"/>
    <rect x="20" y="21" width="1" height="1" fill="#f4f0e8"/>

    <!-- arms -->
    <rect x="10" y="18" width="1" height="2" fill="#6db4ff"/>
    <rect x="9" y="20" width="1" height="3" fill="#f2c9a0"/>
    <rect x="21" y="18" width="1" height="3" fill="#6db4ff"/>
    <rect x="22" y="21" width="1" height="2" fill="#f2c9a0"/>

    <!-- legs (opposite walk pose) -->
    <rect x="13" y="23" width="3" height="1" fill="#3c4c6a"/>
    <rect x="16" y="23" width="3" height="1" fill="#3c4c6a"/>
    <rect x="14" y="24" width="2" height="3" fill="#3c4c6a"/>
    <rect x="16" y="24" width="3" height="4" fill="#3c4c6a"/>
    <rect x="12" y="27" width="3" height="1" fill="#2b2b2b"/>
    <rect x="16" y="28" width="3" height="1" fill="#2b2b2b"/>
    <rect x="12" y="30" width="10" height="1" fill="#00000022"/>
  </g>
</svg>
