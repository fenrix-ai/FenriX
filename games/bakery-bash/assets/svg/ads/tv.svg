<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>TV ad (icon)</title>
  <desc>Pixel-art SVG icon. Transparent background. 32x32.</desc>
  <!-- Billboard-style display (reads as "ad") -->
  <!-- Palette: outline:#1c1a1a panel:#3D2317 trim:#C4873B poster:#7A9E7E glow:#A8C5AB highlight:#F0E6D8 shadow:#00000022 -->

  <!-- sign outline -->
  <rect x="6" y="8" width="20" height="1" fill="#1c1a1a"/>
  <rect x="5" y="9" width="1" height="10" fill="#1c1a1a"/>
  <rect x="26" y="9" width="1" height="10" fill="#1c1a1a"/>
  <rect x="6" y="19" width="20" height="1" fill="#1c1a1a"/>

  <!-- sign fill -->
  <rect x="6" y="9" width="20" height="10" fill="#3D2317"/>
  <rect x="6" y="9" width="20" height="1" fill="#C4873B"/>

  <!-- "poster" area -->
  <rect x="8" y="11" width="16" height="6" fill="#7A9E7E"/>
  <rect x="9" y="12" width="4" height="1" fill="#A8C5AB"/>
  <rect x="14" y="13" width="3" height="1" fill="#A8C5AB"/>
  <rect x="18" y="12" width="5" height="1" fill="#A8C5AB"/>

  <!-- tiny AD mark (pixel letters) -->
  <rect x="10" y="15" width="1" height="1" fill="#1c1a1a"/>
  <rect x="12" y="15" width="1" height="1" fill="#1c1a1a"/>
  <rect x="11" y="14" width="1" height="1" fill="#1c1a1a"/>
  <rect x="11" y="16" width="1" height="1" fill="#1c1a1a"/>
  <rect x="14" y="14" width="1" height="3" fill="#1c1a1a"/>
  <rect x="15" y="14" width="1" height="1" fill="#1c1a1a"/>
  <rect x="15" y="16" width="1" height="1" fill="#1c1a1a"/>
  <rect x="16" y="15" width="1" height="1" fill="#1c1a1a"/>

  <!-- posts -->
  <rect x="10" y="20" width="2" height="6" fill="#1c1a1a"/>
  <rect x="20" y="20" width="2" height="6" fill="#1c1a1a"/>
  <rect x="10" y="20" width="2" height="6" fill="#C4873B"/>
  <rect x="20" y="20" width="2" height="6" fill="#C4873B"/>

  <!-- base + highlight -->
  <rect x="8" y="26" width="16" height="1" fill="#1c1a1a"/>
  <rect x="8" y="27" width="16" height="1" fill="#00000022"/>
  <rect x="7" y="10" width="2" height="1" fill="#F0E6D8"/>
</svg>

